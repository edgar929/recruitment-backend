services:
  postgres:
    image: postgres:17-alpine
    container_name: recruitment-db
    environment:
      POSTGRES_DB: recruitment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: shumbushoedgar/recruitment-backend:latest
    container_name: recruitment-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/recruitment
      DB_USERNAME: postgres
      DB_PASSWORD: 123456
      JWT_SECRET: ${JWT_SECRET}
      CV_DIR: /app/storage/cv
    ports:
      - "8080:8080"
    volumes:
      - cv_storage:/app/storage/cv
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  cv_storage:
