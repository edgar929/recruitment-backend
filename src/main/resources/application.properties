spring.application.name=recruitment-backend

server.port=8080

# --- Database (PostgreSQL) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/recruitment}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

# --- File uploads ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# --- App config ---
app.jwt.issuer=recruitment-backend
app.jwt.secret=${JWT_SECRET:change-me-in-prod-change-me-in-prod-change-me}
app.jwt.access-token-ttl=PT8H
app.storage.cv-dir=${CV_DIR:./storage/cv}

# --- Observability ---
management.endpoints.web.exposure.include=health,info
