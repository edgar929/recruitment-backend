spring.datasource.url=jdbc:h2:mem:recruitment-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

spring.jpa.open-in-view=false

app.jwt.issuer=recruitment-test
app.jwt.secret=test-secret-at-least-256-bits-long-for-hs256
app.jwt.access-token-ttl=PT1H
app.storage.cv-dir=./target/test-cv
